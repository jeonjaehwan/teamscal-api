spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: true

logging:
  level:
    org:
      springframework:
        security: DEBUG

server:
  servlet:
    encoding:
      charset: UTF-8
      force-response: true
      force-request: true

jwt:
  secret: ${APP_JWT_SECRET}
  expiration: 3600
  refreshExpiration: 86400